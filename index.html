<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>一級建築士 建築史クイズ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        .choice-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; cursor: pointer; text-align: left; font-size: 15px; }
        #q-img { max-width: 100%; display: block; margin: 15px 0; }
        .stats { font-weight: bold; color: #2c3e50; margin-bottom: 10px; }
        .next-btn { background: #555; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 15px; }
        .doubt-btn { background: #e67e22; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 15px; }
        .control-panel { margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        #question-title { font-size: 24px; color: #333; margin: 15px 0; font-weight: bold; }
        .list-box { font-size: 13px; color: #555; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>一級建築士 建築史クイズ</h1>
    <div class="control-panel">
        <select id="genreSelect" onchange="resetQuiz()"><option value="全て">全て</option></select>
        <button onclick="toggleQuizType()">形式: <span id="typeName">建築名当て</span></button>
        <button onclick="toggleMode()">モード: <span id="modeName">通常</span></button>
    </div>
    
    <div id="quiz-box">
        <div class="stats" id="remainingStats"></div>
        <h3 id="genre">読み込み中...</h3>
        
        <!-- 建築名当てモード用の表示 -->
        <div id="nameModeArea">
            <p><strong>特徴:</strong> <span id="feature"></span></p>
        </div>

        <!-- 特徴当てモード用の表示 -->
        <div id="featureModeArea" style="display:none;">
            <p>以下の建築物の正しい特徴を選んでください:</p>
            <div id="question-title"></div>
        </div>

        <div id="choices"></div>

        <div id="result" style="display:none; margin-top: 20px; border-top: 1px solid #ccc; padding-top: 15px;">
            <h2 id="feedback"></h2>
            <button class="next-btn" onclick="loadQuestion()">次の問題へ進む</button>
            <!-- あやふやボタンを追加 -->
            <button class="doubt-btn" onclick="markAsDoubt()">うわっ、あやふや…（リストに追加）</button>
            
            <p><strong>建築名:</strong> <span id="ansName" style="font-weight:bold;"></span></p>
            <img id="q-img" src="">
            <p><strong>建築家:</strong> <span id="architect"></span></p>
            <p id="explanation"></p>
        </div>
    </div>
    
    <div class="list-box">
        <p>❌ 間違えたリスト: <span id="wrongList"></span> <button onclick="clearList('wrong')">リセット</button></p>
        <p>⚠️ あやふやリスト: <span id="doubtList"></span> <button onclick="clearList('doubt')">リセット</button></p>
    </div>

    <script>
        let quizData = [];
        let remainingPool = [];
        let wrongList = JSON.parse(localStorage.getItem('wrongList')) || [];
        let doubtList = JSON.parse(localStorage.getItem('doubtList')) || [];
        let mode = "normal"; // normal, review (間違えた), doubt (あやふや)
        let quizType = "name"; // name or feature
        let currentQ = null; // 現在の問題を保持

        fetch('計画-事例集.xlsx')
            .then(res => res.arrayBuffer())
            .then(data => {
                const workbook = XLSX.read(data, {type: 'array'});
                quizData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                const genres = [...new Set(quizData.map(q => q.ジャンル))];
                genres.forEach(g => document.getElementById('genreSelect').innerHTML += `<option value="${g}">${g}</option>`);
                resetQuiz();
            });

        function toggleQuizType() {
            quizType = (quizType === "name") ? "feature" : "name";
            document.getElementById('typeName').innerText = (quizType === "name") ? "建築名当て" : "特徴当て";
            resetQuiz();
        }

        function toggleMode() {
            if (mode === "normal") {
                mode = "review";
                document.getElementById('modeName').innerText = "苦手問題";
            } else if (mode === "review") {
                mode = "doubt";
                document.getElementById('modeName').innerText = "あやふや問題";
            } else {
                mode = "normal";
                document.getElementById('modeName').innerText = "通常";
            }
            resetQuiz();
        }

        function resetQuiz() {
            document.getElementById('result').style.display = 'none';
            
            let filtered = [...quizData];
            if (mode === "review") {
                filtered = quizData.filter(q => wrongList.includes(q.建築名));
            } else if (mode === "doubt") {
                filtered = quizData.filter(q => doubtList.includes(q.建築名));
            }

            const selectedGenre = document.getElementById('genreSelect').value;
            if (selectedGenre !== "全て") filtered = filtered.filter(q => q.ジャンル === selectedGenre);
            
            remainingPool = filtered.sort(() => Math.random() - 0.5);
            
            updateDisplayLists();

            if (remainingPool.length > 0) {
                loadQuestion();
            } else {
                document.getElementById('remainingStats').innerText = "問題がありません";
                document.getElementById('genre').innerText = "該当する問題はありません";
                document.getElementById('feature').innerText = "";
                document.getElementById('question-title').innerText = "";
                document.getElementById('choices').innerHTML = "";
            }
        }

        function clearList(type) {
            if (confirm(type === 'wrong' ? "間違えたリストをリセットしますか？" : "あやふやリストをリセットしますか？")) {
                if (type === 'wrong') {
                    wrongList = [];
                    localStorage.removeItem('wrongList');
                } else {
                    doubtList = [];
                    localStorage.removeItem('doubtList');
                }
                if (mode === type || (type === 'wrong' && mode === "review") || (type === 'doubt' && mode === "doubt")) {
                    mode = "normal";
                    document.getElementById('modeName').innerText = "通常";
                }
                resetQuiz();
            }
        }

        function markAsDoubt() {
            if (currentQ && !doubtList.includes(currentQ.建築名)) {
                doubtList.push(currentQ.建築名);
                localStorage.setItem('doubtList', JSON.stringify(doubtList));
                updateDisplayLists();
                alert("「あやふやリスト」に追加しました！");
            }
        }

        function updateDisplayLists() {
            document.getElementById('wrongList').innerText = wrongList.join(', ');
            document.getElementById('doubtList').innerText = doubtList.join(', ');
        }

        function loadQuestion() {
            if (remainingPool.length === 0) {
                alert("全ての問題が終了しました！最初からやり直します。");
                resetQuiz();
                return;
            }

            currentQ = remainingPool.pop(); 
            const q = currentQ;
            
            document.getElementById('remainingStats').innerText = `残り問題数: ${remainingPool.length + 1}問`;
            document.getElementById('genre').innerText = `【${q.ジャンル}】`;
            document.getElementById('choices').innerHTML = '';
            document.getElementById('result').style.display = 'none';

            let correctValue = "";
            if (quizType === "name") {
                document.getElementById('nameModeArea').style.display = "block";
                document.getElementById('featureModeArea').style.display = "none";
                document.getElementById('feature').innerText = q.特徴;
                correctValue = q.建築名;
            } else {
                document.getElementById('nameModeArea').style.display = "none";
                document.getElementById('featureModeArea').style.display = "block";
                document.getElementById('question-title').innerText = q.建築名;
                correctValue = q.特徴;
            }

            let keyToMap = (quizType === "name") ? "建築名" : "特徴";
            let genreCandidates = quizData.filter(item => item.ジャンル === q.ジャンル).map(item => item[keyToMap]);
            let choices = [correctValue];
            while(choices.length < 4 && genreCandidates.length > choices.length) {
                let cand = genreCandidates[Math.floor(Math.random() * genreCandidates.length)];
                if(!choices.includes(cand)) choices.push(cand);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(val => {
                let btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = val;
                btn.onclick = () => {
                    document.getElementById('result').style.display = 'block';
                    const isCorrect = (val === correctValue);
                    document.getElementById('feedback').innerText = isCorrect ? "正解！" : "残念！正解は " + correctValue;
                    document.getElementById('ansName').innerText = q.建築名;
                    document.getElementById('architect').innerText = q.建築家;
                    document.getElementById('explanation').innerText = q.解説;
                    
                    if (q.画像) {
                        document.getElementById('q-img').src = `https://images.weserv.nl/?url=${q.画像.replace('raw.github.com', 'raw.githubusercontent.com')}&w=500`;
                        document.getElementById('q-img').style.display = "block";
                    } else {
                        document.getElementById('q-img').style.display = "none";
                    }

                    if (!isCorrect && !wrongList.includes(q.建築名)) {
                        wrongList.push(q.建築名);
                        localStorage.setItem('wrongList', JSON.stringify(wrongList));
                        updateDisplayLists();
                    }
                };
                document.getElementById('choices').appendChild(btn);
            });
            updateDisplayLists();
        }
    </script>
</body>
</html>
