<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>一級建築士 建築史クイズ</title>
    <!-- SheetJSを読み込む -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; text-align: center; }
        .choice-btn { display: block; width: 100%; padding: 10px; margin: 5px 0; }
        #q-img { max-width: 100%; }
    </style>
</head>
<body>
    <h1>建築史クイズ</h1>
    <div id="quiz-box">
        <h3 id="genre">読み込み中...</h3>
        <div id="choices"></div>
        <div id="result" style="display:none;">
            <h2 id="feedback"></h2>
            <img id="q-img" src="">
            <p id="explanation"></p>
            <button onclick="loadQuestion()">次の問題へ</button>
        </div>
    </div>

    <script>
        let quizData = [];

        // Excelを読み込んで変換する処理
        fetch('計画-事例集.xlsx')
            .then(res => res.arrayBuffer())
            .then(data => {
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                quizData = XLSX.utils.sheet_to_json(sheet);
                loadQuestion();
            });

        function loadQuestion() {
            const q = quizData[Math.floor(Math.random() * quizData.length)];
            document.getElementById('genre').innerText = `【${q.ジャンル}】 ${q.特徴}`;
            document.getElementById('choices').innerHTML = '';
            document.getElementById('result').style.display = 'none';

            // 選択肢をランダム生成
            let choices = [q.建築名];
            while(choices.length < 4) {
                let randomQ = quizData[Math.floor(Math.random() * quizData.length)];
                if(!choices.includes(randomQ.建築名)) choices.push(randomQ.建築名);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(name => {
                let btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = name;
                btn.onclick = () => {
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('feedback').innerText = (name === q.建築名) ? "正解！" : "残念！正解は " + q.建築名;
                    document.getElementById('q-img').src = `https://images.weserv.nl/?url=${q.画像.replace('raw.github.com', 'raw.githubusercontent.com')}&w=500`;
                    document.getElementById('explanation').innerText = q.解説;
                };
                document.getElementById('choices').appendChild(btn);
            });
        }
    </script>
</body>
</html>
